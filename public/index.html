<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>在庫管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>在庫管理システム</h1>

  <form id="product-form">
  <input
    type="text"
    id="name"
    placeholder="商品名"
    required
  >

  <input
    type="number"
    id="price"
    placeholder="価格"
    required
  >

  <input
    type="text"
    id="category"
    placeholder="カテゴリ"
    required
  >

  <input
    type="number"
    id="stock_quantity"
    placeholder="在庫数"
    required
  >

  <button type="submit">
    商品追加
  </button>
</form>

<h2>商品編集</h2>

<form id="edit-form">
  <input type="hidden" id="edit-id">

  <input
    type="text"
    id="edit-name"
    placeholder="商品名"
    required
  >

  <input
    type="number"
    id="edit-price"
    placeholder="価格"
    required
  >

  <input
    type="text"
    id="edit-category"
    placeholder="カテゴリ"
    required
  >

  <button type="submit">
    更新
  </button>
</form>

<h2>在庫操作</h2>

<form id="stock-form">
  <input
    type="number"
    id="stock-product-id"
    placeholder="商品ID"
    required
  >

  <input
    type="number"
    id="stock-quantity"
    placeholder="数量"
    required
  >

  <input
    type="text"
    id="stock-memo"
    placeholder="メモ"
  >

  <button
    type="button"
    onclick="stockInForm()"
  >
    入庫
  </button>

  <button
    type="button"
    onclick="stockOutForm()"
  >
    出庫
  </button>
</form>

<div>
  <input
    type="text"
    id="search"
    placeholder="商品名で検索"
  >

  <input
    type="text"
    id="search-category"
    placeholder="カテゴリで絞り込み"
  >

  <button onclick="searchProducts()">
    検索
  </button>

  <button onclick="fetchProducts()">
    全件表示
  </button>
</div>

  <div id="product-list"></div>

  <h2>入出庫履歴</h2>
<div id="stock-log-list"></div>


  <script src="script.js"></script>
</body>
</html>
